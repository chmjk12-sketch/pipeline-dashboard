name: Deploy

on:
  push:
    branches: [main]

env:
  APP_NAME: pipeline-dashboard
  APP_PORT: "3001"
  REGISTRY_URL: crpi-2hhvyuuzflfxsyey.cn-beijing.personal.cr.aliyuncs.com
  REGISTRY_NAMESPACE: chmjk67
  ACR_REGION: cn-beijing
  DOMAIN: chmjk67.top
  ECS_IP: 39.105.86.184

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ====== Step 1: иҮӘеҠЁеҲӣе»ә ACR й•ңеғҸд»“еә“ ======
      - name: Ensure ACR repository exists
        run: |
          # йҳҝйҮҢдә‘ API зӯҫеҗҚеҮҪж•°
          sign_aliyun() {
            local HTTP_METHOD="GET"
            local ACTION="$1"
            shift
            # жһ„йҖ еҸӮж•°еӯ—з¬ҰдёІ
            local PARAMS="AccessKeyId=${{ secrets.ALIYUN_ACCESS_KEY_ID }}&Action=${ACTION}&Format=JSON&SignatureMethod=HMAC-SHA1&SignatureNonce=$(date +%s%N)&SignatureVersion=1.0&Timestamp=$(date -u +'%Y-%m-%dT%%3A%H%%3A%M%%3S%%Z')&Version=2016-06-07"
            for kv in "$@"; do PARAMS="${PARAMS}&${kv}"; done
            # жһ„йҖ еҫ…зӯҫеӯ—з¬ҰдёІ
            local SORTED=$(echo "$PARAMS" | tr '&' '\n' | sort | tr '\n' '&' | sed 's/&$//')
            local STRING_TO_SIGN="${HTTP_METHOD}&$(python3 -c 'import urllib.parse; print(urllib.parse.quote("/", safe=""))')&$(python3 -c 'import urllib.parse; print(urllib.parse.quote("'"$SORTED"'", safe=""))')"
            local SIGNATURE=$(echo -n "$STRING_TO_SIGN" | openssl dgst -sha1 -hmac "${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}&" -binary | base64)
            SIGNATURE=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$SIGNATURE', safe=''))")
            echo "https://cr.${ACR_REGION}.aliyuncs.com/?${PARAMS}&Signature=${SIGNATURE}"
          }

          # жҹҘиҜўд»“еә“жҳҜеҗҰеӯҳеңЁ
          URL=$(sign_aliyun "GetRepository" "RepoNamespace=${REGISTRY_NAMESPACE}" "RepoName=${APP_NAME}")
          RESP=$(curl -s "$URL")
          echo "Check response: $RESP"

          if echo "$RESP" | grep -q '"Code"'; then
            echo "Repository not found, creating..."
            URL=$(sign_aliyun "CreateRepository" "RepoNamespace=${REGISTRY_NAMESPACE}" "RepoName=${APP_NAME}" "RepoType=PUBLIC" "Summary=${APP_NAME}")
            RESP=$(curl -s "$URL")
            echo "Create response: $RESP"
            if echo "$RESP" | grep -q '"IsSuccess":true'; then
              echo "вң… ACR repository created"
            else
              echo "вҡ пёҸ ACR create returned: $RESP"
            fi
          else
            echo "вң… ACR repository already exists"
          fi

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY_URL }}/${{ env.REGISTRY_NAMESPACE }}/${{ env.APP_NAME }}:latest
            ${{ env.REGISTRY_URL }}/${{ env.REGISTRY_NAMESPACE }}/${{ env.APP_NAME }}:${{ github.sha }}

      - uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            /opt/app/scripts/deploy.sh \
              --app-name ${{ env.APP_NAME }} \
              --image ${{ env.REGISTRY_URL }}/${{ env.REGISTRY_NAMESPACE }}/${{ env.APP_NAME }}:${{ github.sha }} \
              --port ${{ env.APP_PORT }} \
              --internal-port 80 \
              --health-path /

            # иҮӘеҠЁй…ҚзҪ® Caddy и·Ҝз”ұ
            ROUTE_LINE="${{ env.APP_NAME }}.${{ env.DOMAIN }} {"
            if ! grep -qF "$ROUTE_LINE" /opt/app/Caddyfile; then
              sed -i "/^:80 {/i\\${{ env.APP_NAME }}.${{ env.DOMAIN }} {\n  reverse_proxy ${{ env.APP_NAME }}_app:80\n}\n" /opt/app/Caddyfile
              docker exec -w /etc/caddy caddy caddy reload
              echo "вң… Caddy route added"
            else
              echo "Caddy route already exists"
            fi

      # ====== Step 4: иҮӘеҠЁж·»еҠ  DNS A и®°еҪ• ======
      - name: Ensure DNS A record exists
        run: |
          sign_dns() {
            local ACTION="$1"
            shift
            local PARAMS="AccessKeyId=${{ secrets.ALIYUN_ACCESS_KEY_ID }}&Action=${ACTION}&Format=JSON&SignatureMethod=HMAC-SHA1&SignatureNonce=$(date +%s%N)&SignatureVersion=1.0&Timestamp=$(date -u +'%Y-%m-%dT%%3A%H%%3A%M%%3S%%Z')&Version=2015-01-09"
            for kv in "$@"; do PARAMS="${PARAMS}&${kv}"; done
            local SORTED=$(echo "$PARAMS" | tr '&' '\n' | sort | tr '\n' '&' | sed 's/&$//')
            local STRING_TO_SIGN="GET&$(python3 -c 'import urllib.parse; print(urllib.parse.quote("/", safe=""))')&$(python3 -c 'import urllib.parse; print(urllib.parse.quote("'"$SORTED"'", safe=""))')"
            local SIG=$(echo -n "$STRING_TO_SIGN" | openssl dgst -sha1 -hmac "${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}&" -binary | base64)
            SIG=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$SIG', safe=''))")
            echo "https://alidns.aliyuncs.com/?${PARAMS}&Signature=${SIG}"
          }

          URL=$(sign_dns "DescribeDomainRecords" "DomainName=${DOMAIN}" "RRKeyWord=${APP_NAME}" "TypeKeyWord=A")
          RESP=$(curl -s "$URL")
          echo "DNS check: $RESP"

          if ! echo "$RESP" | grep -q '"Value":"'"${ECS_IP}"'"'; then
            echo "Adding DNS A record: ${APP_NAME}.${DOMAIN} -> ${ECS_IP}"
            URL=$(sign_dns "AddDomainRecord" "DomainName=${DOMAIN}" "RR=${APP_NAME}" "Type=A" "Value=${ECS_IP}" "TTL=600")
            RESP=$(curl -s "$URL")
            echo "DNS add: $RESP"
            if echo "$RESP" | grep -q '"RecordId"'; then
              echo "вң… DNS A record added"
            else
              echo "вҡ пёҸ DNS add: $RESP"
            fi
          else
            echo "вң… DNS record already exists"
          fi

      # ====== Step 5: йӘҢиҜҒйғЁзҪІ ======
      - name: Verify deployment
        run: |
          sleep 5
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "http://${ECS_IP}:${APP_PORT}/" || echo "000")
          echo "Health check: ${ECS_IP}:${APP_PORT} -> HTTP ${HTTP_CODE}"
          if [ "$HTTP_CODE" = "200" ]; then
            echo "вң… Deployment verified: https://${APP_NAME}.${DOMAIN}"
          else
            echo "вҡ пёҸ Health check returned ${HTTP_CODE}"
          fi
